<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI Home Price Predictor</title>
    <link rel="stylesheet" href="/client/app.css" />
  </head>
  <body>
    <div class="main">
      <div class="card">
        <h1>🏠Home Price Predictor</h1>
        <p class="subtitle">
          Predict Bangalore property prices using Machine Learning
        </p>

        <div class="input-group">
          <label>📍 Location</label>
          <select id="uiLocations"></select>
        </div>

        <div class="input-group">
          <label>📐 Area (sqft)</label>
          <input type="number" id="uiSqft" placeholder="e.g. 1200" />
        </div>

        <div class="row">
          <div class="input-group">
            <label>🛏 BHK</label>
            <input type="number" id="uiBHK" />
          </div>

          <div class="input-group">
            <label>🛁 Bath</label>
            <input type="number" id="uiBathrooms" />
          </div>
        </div>

        <button onclick="onClickedEstimatePrice()">🚀 Predict Price</button>

        <div class="result-box">
          <h2 id="uiEstimatedPrice">₹ --</h2>
        </div>
      </div>
    </div>

    <script src="/client/app.js"></script>
  </body>
</html>
